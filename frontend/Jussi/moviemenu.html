<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movie Page</title>
  <link rel="stylesheet" href="./css/movie.css" />
</head>
<body>
  <main class="movie-page">
    <header class="movie-topbar">
      <div class="topbar-left">
        <span class="logo-text">Logo</span>
      </div>

      <div class="topbar-right">
        <a href="#" class="lang-link">EN/FI</a>
        <button class="icon-btn" type="button" aria-label="Search">⌕</button>
        <button class="icon-btn" type="button" aria-label="Account">👤</button>
        <button class="icon-btn" type="button" aria-label="Menu">☰</button>
      </div>
    </header>

    <nav class="movie-tabs" aria-label="Movie categories">
      <a href="./moviemenu.html" class="movie-tab active">Now Showing</a>
      <a href="./upcomingmenu.html" class="movie-tab">Upcoming</a>
    </nav>

    <section class="movie-list-section">
      <div class="movie-grid" id="movieGrid"></div>
    </section>

    <div class="movie-footer-wrap">
      <footer class="movie-footer">
        <div class="footer-grid">
          <section class="footer-left" aria-label="Contact us">
            <h2 class="footer-heading">Contact us</h2>
            <div class="footer-list">
              <div class="footer-item">
                <span class="footer-icon">⌖</span>
                <span>Kalliotie 6, 90500, Oulu</span>
              </div>
              <div class="footer-item">
                <span class="footer-icon">✆</span>
                <span>08 5542711</span>
              </div>
              <div class="footer-item">
                <span class="footer-icon">✉</span>
                <a class="footer-email" href="mailto:booking@elokuvateatteristar.com">booking@elokuvateatteristar.com</a>
              </div>
            </div>
          </section>

          <section class="footer-right" aria-label="Opening hours and social links">
            <div>
              <h2 class="footer-heading">Opening hours</h2>
              <div class="footer-hours">
                <div class="hours-row">
                  <span class="hours-day">Monday - Friday</span>
                  <span class="hours-time">10:00 AM - 11:00 PM</span>
                </div>
                <div class="hours-row">
                  <span class="hours-day">Saturday - Sunday</span>
                  <span class="hours-time">09:00 AM - 12:00 AM</span>
                </div>
              </div>
            </div>

            <div>
              <h2 class="footer-heading">Follow us</h2>
              <div class="footer-social-row">
                <a href="#" class="social-link" aria-label="Facebook">f</a>
                <a href="#" class="social-link" aria-label="Instagram">◎</a>
              </div>
            </div>
          </section>
        </div>
      </footer>
    </div>
  </main>

  <script>
    const movieGrid = document.getElementById('movieGrid')

    const renderMovies = (movies) => {
      movieGrid.innerHTML = movies.map((movie) => `
      <a href="./moviedetails.html?id=${movie.movie_id}" class="movie-link">
        <article class="movie-card">
          <div class="movie-poster"></div>
          <h2 class="movie-title">${movie.title}</h2>
          <p class="movie-time">${movie.genre}</p>
        </article>
       </a> 
      `).join('')
    }

    const loadMovies = async () => {
      try {
        const response = await fetch('http://localhost:3001/api/movies/now-showing')

        if (!response.ok) {
          throw new Error('Failed to fetch movies')
        }

        const movies = await response.json()
        renderMovies(movies)
      } catch (error) {
        console.error(error)
        movieGrid.innerHTML = '<p class="movie-time">Failed to load movies.</p>'
      }
    }

    loadMovies()
  </script>
</body>
</html>
