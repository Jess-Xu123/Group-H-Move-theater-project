<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Menu</title>
  <link rel="stylesheet" href="./css/foodmenu.css" />
</head>
<body>
  <main class="menu-page">
    <header class="menu-topbar">
      <div class="topbar-left">
        <span class="logo-text">Logo</span>
      </div>

      <div class="topbar-right">
        <a href="#" class="lang-link">EN/FI</a>
        <button class="icon-btn" type="button" aria-label="Search">⌕</button>
        <button class="icon-btn" type="button" aria-label="Account">👤</button>
        <button class="icon-btn" type="button" aria-label="Menu">☰</button>
      </div>
    </header>

    <nav class="menu-tabs" aria-label="Menu categories">
      <a href="#food" class="menu-tab active">Food</a>
      <a href="#drinks" class="menu-tab">Drinks</a>
      <a href="#snacks" class="menu-tab">Snacks</a>
      <a href="#others" class="menu-tab">Others</a>
    </nav>

    <section id="food" class="menu-section">
      <h2 class="menu-heading">Food</h2>
      <div id="foodList"></div>
    </section>

    <section id="drinks" class="menu-section">
      <h2 class="menu-heading">Drinks</h2>
      <div id="drinksList"></div>
    </section>

    <section id="snacks" class="menu-section">
      <h2 class="menu-heading">Snacks</h2>
      <div id="snacksList"></div>
    </section>

    <section id="others" class="menu-section">
      <h2 class="menu-heading">Others</h2>
      <div id="othersList"></div>
    </section>

    <div class="menu-footer-wrap">
      <footer class="menu-footer">
        <div class="footer-grid">
          <section class="footer-left" aria-label="Contact us">
            <h2 class="footer-heading">Contact us</h2>
            <div class="footer-list">
              <div class="footer-item">
                <span class="footer-icon">⌖</span>
                <span>Kalliotie 6, 90500, Oulu</span>
              </div>
              <div class="footer-item">
                <span class="footer-icon">✆</span>
                <span>08 5542711</span>
              </div>
              <div class="footer-item">
                <span class="footer-icon">✉</span>
                <a class="footer-email" href="mailto:booking@elokuvateatteristar.com">booking@elokuvateatteristar.com</a>
              </div>
            </div>
          </section>

          <section class="footer-right" aria-label="Opening hours and social links">
            <div>
              <h2 class="footer-heading">Opening hours</h2>
              <div class="footer-hours">
                <div class="hours-row">
                  <span class="hours-day">Monday - Friday</span>
                  <span class="hours-time">10:00 AM - 11:00 PM</span>
                </div>
                <div class="hours-row">
                  <span class="hours-day">Saturday - Sunday</span>
                  <span class="hours-time">09:00 AM - 12:00 AM</span>
                </div>
              </div>
            </div>

            <div>
              <h2 class="footer-heading">Follow us</h2>
              <div class="footer-social-row">
                <a href="#" class="social-link" aria-label="Facebook">f</a>
                <a href="#" class="social-link" aria-label="Instagram">◎</a>
              </div>
            </div>
          </section>
        </div>
      </footer>
    </div>
  </main>

  <script>
    const foodList = document.getElementById('foodList')
    const drinksList = document.getElementById('drinksList')
    const snacksList = document.getElementById('snacksList')
    const othersList = document.getElementById('othersList')

    const formatPrice = (price) => {
      return `${Number(price).toFixed(2).replace('.', ',')}€`
    }

    const createItemHtml = (item) => {
      return `
        <article class="menu-item">
          <div class="menu-image"></div>
          <div class="menu-info">
            <h3 class="menu-name">${item.name}</h3>
            <p class="menu-desc">${item.description}</p>
            <p class="menu-price">${formatPrice(item.price)}</p>
          </div>
          <div class="menu-action">
            <button class="add-btn" type="button">add</button>
          </div>
        </article>
      `
    }

    const renderFoods = (items) => {
      foodList.innerHTML = ''
      drinksList.innerHTML = ''
      snacksList.innerHTML = ''
      othersList.innerHTML = ''

      items.forEach((item) => {
        const html = createItemHtml(item)

        if (item.category === 'Food') {
          foodList.innerHTML += html
        } else if (item.category === 'Drinks') {
          drinksList.innerHTML += html
        } else if (item.category === 'Snacks') {
          snacksList.innerHTML += html
        } else if (item.category === 'Others') {
          othersList.innerHTML += html
        }
      })
    }

    const loadFoods = async () => {
      try {
        const response = await fetch('http://localhost:3001/api/foods')

        if (!response.ok) {
          throw new Error('Failed to fetch food items')
        }

        const items = await response.json()
        renderFoods(items)
      } catch (error) {
        console.error(error)
        foodList.innerHTML = '<p class="menu-desc">Failed to load menu items.</p>'
      }
    }

    loadFoods()
  </script>
</body>
</html>
