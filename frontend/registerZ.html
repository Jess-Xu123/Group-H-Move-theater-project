<main class="page main-content pt-3 pt-md-5 px-3 px-md-0">
<div>
<h2 class="mb-4">New Account</h2>

<form>
    <div class="mb-3">
    <label>Username</label>
    <input type="username" id="reg-username" class="form-control">
    </div>

    <div class="mb-3">
    <label>Email</label>
    <input type="email" id="reg-email" class="form-control">
    </div>

    <div class="mb-3">
    <label>Password</label>
    <input type="password" id="reg-password" class="form-control">
    </div>

    <div class="mb-3">
    <label>Confirm Password</label>
    <input type="password" id="reg-password-confirm" class="form-control">
    </div>

    <div class="mb-3">
    <label>Confirm Email</label>
    <div class="d-flex gap-2">
        <input type="text" id="reg-verification-code" class="form-control">
        <button type="button" id="send-code-btn" class="btn-small">send</button>
    </div>
    </div>

    <button type="button" id="create-account-btn" class="btn btn-main w-100">Create Account</button>
    </div>
</form>
</main>
