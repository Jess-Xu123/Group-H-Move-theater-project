<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie theater home screen</title>
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="main-bg text-white">
    

<!-- TOP NAV -->
<nav class="navbar navbar-dark px-3 py-2">
    <div class="container-fluid p-0">
        <a class="navbar-brand fw-bold" href="#">Logo</a>
   <div class="d-flex align-items-center gap-3">
            <span class="lang-text">EN/FI</span>
            <i class="bi bi-search fs-5"></i>
            <i class="bi bi-person fs-4"></i>
            <i class="bi bi-list fs-3" id="menuToggle" style="cursor:pointer;"></i>
        </div>
    </div>
</nav>

<!-- HERO BANNER -->
<section class="hero-banner mx-3 mt-2 p-5 text-center">
    <h2 class="hero-title mb-4">HOME FEELING EXPERIENCE</h2>

    <div class="d-flex justify-content-center gap-3 flex-wrap">
        <button class="btn btn-buy-tickets border-0">
            <i class="bi bi-ticket-perforated-fill me-2"></i>Buy tickets
        </button>
        <button class="btn btn-buy-snacks">
            <i class="bi bi-bag-fill me-2"></i>Buy drinks and snacks
        </button>
    </div>
</section>

<!-- MOVIE NOW SHOWN -->
<div class="container-fluid px-3 mt-4">
    <h5 class="section-title mb-3">Movie now shown</h5>

    <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
        <div class="col-6 col-md-4 col-lg-2"><div class="movie-card"></div></div>
    </div>
</div>

<!-- UPCOMING EVENTS -->
<div class="container-fluid px-3 mt-4">
    <h5 class="section-title mb-3">Upcoming Events</h5>

    <div class="events-container"></div>
</div>

<!-- FOOTER -->
<footer class="footer-section mt-1 px-3 pt-4 pb-5">
    <div class="row g-4">
<!-- Contact us -->
        <div class="col-sm-6 col-md-5">
            <h6 class="footer-label">Contact us</h6>
            <div class="footer-detail mt-3">
                <p><i class="bi bi-geo-alt-fill me-2"></i>Kalliotie 6, 90500, Oulu</p>
                    <p><i class="bi bi-telephone-fill me-2"></i>08 5542711</p>
                    <p><i class="bi bi-envelope-fill me-2"></i>booking@elokuvateatterister.com</p>
                </div>
            </div>
<!-- Opening hours -->
        <div class="col-sm-6 col-md-7">
            <h6 class="footer-label"><i class="bi bi-clock-fill me-2"></i>Opening hours</h6>
            <div class="footer-detail mt-3">
                <div class="opening-row d-flex justify-content-between mb-2">
                        <span class="text-muted-custom">Monday - Friday</span>
                        <span class="time-text">10:00 AM - 11:00 PM</span>
                    </div>
                    <div class="opening-row d-flex justify-content-between">
                        <span class="text-muted-custom">Saturday - Sunday</span>
                        <span class="time-text">09:00 AM - 12:00 AM</span>
                    </div>
                </div>
<!-- Follow us -->
            <h6 class="footer-label mt-4">Follow us</h6>
            <div class="d-flex gap-3 mt-2 social-icons">
                <i class="bi bi-facebook fs-4"></i>
                <i class="bi bi-instagram fs-4"></i>
            </div>
        </div>
    </div>
</div>
</footer>
<script src="app.js"></script>
</body>
</html>
